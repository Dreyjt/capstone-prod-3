version: "3.8"

services:
  app:
    build: .
    container_name: dumbbudget_app
    ports:
      - "3000:3000"
    environment:
      - DUMBBUDGET_PIN=${PIN}
      - BASE_URL=http://localhost:3000
    volumes:
      - app_data:/app/data
    restart: always

  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    ports:
      - "9100:9100"
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: always
    depends_on:
      - node_exporter

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    restart: always
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  app_data:
  grafana_data: