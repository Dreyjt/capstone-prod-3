name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  # ----------------------------------------
  # Job 1: Test
  # ----------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Run Lint
        run: npm run lint || echo "Skipping lint"

      - name: Run Tests
        run: npm test || echo "Skipping tests"

  # ----------------------------------------
  # Job 2: Build & Push Docker Image
  # ----------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/dumbbudget:latest .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/dumbbudget:latest

  # ----------------------------------------
  # Job 3: Deploy to EC2 (NEW)
  # ----------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build          # only runs after build succeeds
    steps:
      - name: SSH into EC2 and update containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd /opt/dumbbudget
            echo "Pulling latest Docker images..."
            sudo /usr/local/bin/docker-compose pull
            echo "Recreating containers with new images..."
            sudo /usr/local/bin/docker-compose up -d
            echo "Cleaning up old images..."
            sudo docker image prune -f
            echo "Deployment complete!"