name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  # ---------------------------
  # Job 1: Test
  # ---------------------------
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Run Lint
      - name: Run Lint
        run: |
          npm run lint || echo "Skipping lint"

      # 5. Run Tests
      - name: Run Tests
        run: |
          npm test || echo "Skipping tests"

  # ---------------------------
  # Job 2: Build & Push Docker
  # ---------------------------
  build:
    runs-on: ubuntu-latest
    needs: test   # ← only runs if test job succeeds

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Build Docker image
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/dumbbudget:latest .

      # 3. Login to Docker Hub (proper way)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Push Docker image
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/dumbbudget:latest